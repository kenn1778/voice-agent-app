name: Mobile CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: apps/mobile
      - run: npm run lint
        working-directory: apps/mobile
      - run: npm run typecheck
        working-directory: apps/mobile
      - run: npm test
        working-directory: apps/mobile
